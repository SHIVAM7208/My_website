 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Delayed Submit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5; /* light background */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        form {
            background-color: #FFF; /* white background */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #5D4037; /* dark brown */
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #5D4037; /* dark brown */
        }

        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #completed, #submitBtn {
            display: inline-block;
            background-color: #8BC34A; /* light green */
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        #submitBtn {
            display: none;
        }

        #delayDisplay, #timeDisplay {
            margin-top: 15px;
            color: #5D4037; /* dark brown */
        }

        footer {
            color: #5D4037; /* dark brown */
        }
    </style>
</head>
<body>

    <h1>Fill the Form</h1>
    <form id="userForm">
        <label for="username">Username</label>
        <input type="text" id="username" name="username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password">

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">

        <label for="address">Address</label>
        <input type="text" id="address" name="address">

        <button type="button" id="completed">Completed</button>
        <button type="submit" id="submitBtn">Submit</button>

        <div id="delayDisplay"></div>
        <div id="timeDisplay"></div>
    </form>

    <footer>
        <p>&copy; 2024 Selenium with shivam</p>
    </footer>

    <script>
        document.getElementById('completed').addEventListener('click', function() {
            const fields = [
                document.getElementById('username').value,
                document.getElementById('email').value,
                document.getElementById('password').value,
                document.getElementById('phone').value,
                document.getElementById('address').value
            ];

            const filledFieldsCount = fields.filter(field => field !== '').length;
            let delayTime = filledFieldsCount * 5000; // 5 seconds per field

            if (filledFieldsCount > 0) {
                document.getElementById('submitBtn').style.display = 'none'; // Hide submit button initially
                document.getElementById('delayDisplay').textContent = `Delay: ${delayTime / 1000} seconds...`;
                const startTime = new Date();

                setTimeout(function() {
                    document.getElementById('submitBtn').style.display = 'inline-block'; // Show submit button after delay

                    // Display current time when the submit button appears
                    const now = new Date();
                    const timeString = now.toLocaleTimeString();
                    const elapsedTime = (now - startTime) / 1000;
                    document.getElementById('timeDisplay').textContent = `Submit button visible after ${elapsedTime} seconds at: ${timeString}`;
                }, delayTime);
            } else {
                alert('Please fill at least one field!');
            }
        });
    </script>

</body>
</html>
